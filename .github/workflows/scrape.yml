name: Daily Scrape, Analyze & Match

on:
  schedule:
    # 매일 05:00 UTC (한국시간 14:00) 실행
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Playwright 설치(--with-deps) ~9분 + myhome 109건 detail+PDF ~11분 +
    # SH 50건 detail ~2분 + analyze ~3분 + overhead 여유 필요 → 45분으로 확장
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run DB migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx drizzle-kit migrate

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/scrape.ts

      - name: Run analyzer
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/analyze.ts

      # 분석 직후 자동으로 매칭까지 이어서 실행
      # 실패해도 다음 회차에서 재시도 가능하므로 continue-on-error 미사용 (에러는 빨리 드러나는 게 낫다)
      - name: Run matcher
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/match.ts
